  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ledger — Loading States<\u002Ftitle>\n\n<style>\n  :root{\n    --bg:#f5f6f8;\n    --card:#ffffff;\n    --border:#e7e9ee;\n    --ink:#0f1a2e;\n    --muted:#8b93a3;\n    --label:#6b7280;\n    --blue:#2f43e8;\n    --blue-soft:#dfe3fb;\n    --teal:#12b3a4;\n    --teal-soft:#d2f1ee;\n    --purple:#7c5cf5;\n    --purple-soft:#e6dffb;\n    --red:#e0453b;\n    --green:#1faa5a;\n    --skel:#eef0f4;\n    --skel-hi:#f8f9fb;\n    --mono:\"SFMono-Regular\",ui-monospace,\"JetBrains Mono\",Menlo,Consolas,monospace;\n    --sans:\"Helvetica Neue\",Helvetica,Arial,\"Segoe UI\",system-ui,sans-serif;\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    background:var(--bg);\n    font-family:var(--sans);\n    color:var(--ink);\n    -webkit-font-smoothing:antialiased;\n    padding:48px 40px 64px;\n  }\n  .page-head{max-width:1180px;margin:0 auto 28px;}\n  .crumb{font-size:13px;color:var(--muted);letter-spacing:.01em;margin-bottom:6px;}\n  .crumb b{color:var(--ink);font-weight:600;}\n  h1{font-size:34px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px;}\n  .sub{font-size:15px;color:var(--label);}\n\n  .grid{\n    max-width:1180px;margin:0 auto;\n    display:grid;grid-template-columns:repeat(3,1fr);\n    gap:20px;\n  }\n  .cell{\n    background:var(--card);\n    border:1px solid var(--border);\n    border-radius:10px;\n    height:280px;\n    display:flex;flex-direction:column;\n    overflow:hidden;\n    box-shadow:0 1px 2px rgba(15,26,46,.03);\n  }\n  .stage{\n    flex:1;display:flex;align-items:center;justify-content:center;\n    padding:20px;position:relative;\n  }\n  .meta{\n    border-top:1px solid var(--border);\n    padding:13px 18px;\n    display:flex;align-items:center;justify-content:space-between;\n    gap:10px;\n  }\n  .meta .name{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--label);}\n  .meta .idx{font-family:var(--mono);font-size:11px;color:#c3c8d2;}\n\n  /* ===== 1. KPI skeleton card ===== */\n  .skel-card{width:100%;max-width:220px;display:flex;flex-direction:column;gap:14px;}\n  .shimmer{\n    background:linear-gradient(100deg,var(--skel) 30%,var(--skel-hi) 50%,var(--skel) 70%);\n    background-size:220% 100%;\n    border-radius:5px;\n    animation:shimmer 1.4s ease-in-out infinite;\n  }\n  @keyframes shimmer{0%{background-position:130% 0;}100%{background-position:-30% 0;}}\n  .sk-label{height:9px;width:55%;}\n  .sk-num{height:30px;width:78%;}\n  .sk-spark{height:34px;width:100%;margin-top:4px;}\n  .sk-foot{height:9px;width:42%;}\n\n  /* ===== 2. Line draw-in ===== */\n  .line-wrap{width:100%;height:100%;}\n  .line-path{\n    fill:none;stroke:var(--blue);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;\n    stroke-dasharray:520;stroke-dashoffset:520;\n    animation:draw 2.4s ease-in-out infinite;\n  }\n  .line-path.t2{stroke:var(--teal);stroke-width:2.5;animation-delay:.25s;stroke-dasharray:480;stroke-dashoffset:480;}\n  @keyframes draw{\n    0%{stroke-dashoffset:520;}\n    55%{stroke-dashoffset:0;}\n    78%{stroke-dashoffset:0;opacity:1;}\n    92%{opacity:0;}\n    100%{stroke-dashoffset:520;opacity:0;}\n  }\n  .grid-line{stroke:#eef0f4;stroke-width:1;}\n\n  /* ===== 3. Donut ring ===== */\n  .donut circle{fill:none;stroke-width:13;stroke-linecap:round;}\n  .donut .track{stroke:#eef0f4;}\n  /* r=48 -> circumference ~301.6; show ~25% arc */\n  .donut .seg{stroke-dasharray:75 227;}\n  .donut-seg-wrap{transform-box:fill-box;transform-origin:center;animation:donutspin 1.15s linear infinite;}\n  @keyframes donutspin{100%{transform:rotate(360deg);}}\n\n  /* ===== 4. Equalizer bars ===== */\n  .bars{display:flex;align-items:flex-end;gap:9px;height:120px;}\n  .bars span{\n    width:16px;border-radius:3px 3px 0 0;\n    animation:eq 1.1s ease-in-out infinite;\n  }\n  @keyframes eq{0%,100%{height:18%;}50%{height:100%;}}\n\n  /* ===== 5. Sparkline pulse + number ===== */\n  .spark-block{display:flex;flex-direction:column;gap:18px;align-items:center;}\n  .sk-sparknum{height:18px;width:96px;}\n  .spark-svg .sp{fill:none;stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;\n    stroke-dasharray:200;animation:sparkrun 1.6s linear infinite;}\n  @keyframes sparkrun{0%{stroke-dashoffset:200;}50%{stroke-dashoffset:0;}100%{stroke-dashoffset:-200;}}\n  .spark-dot{fill:var(--blue);animation:dotpulse 1.6s ease-in-out infinite;}\n  @keyframes dotpulse{0%,100%{r:0;opacity:0;}50%{r:4;opacity:1;}}\n\n  /* ===== 6. Sequential dots ===== */\n  .dots{display:flex;gap:14px;}\n  .dots span{width:14px;height:14px;border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}\n  .dots span:nth-child(1){background:var(--blue);}\n  .dots span:nth-child(2){background:var(--teal);animation-delay:.18s;}\n  .dots span:nth-child(3){background:var(--purple);animation-delay:.36s;}\n  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35;}40%{transform:translateY(-16px);opacity:1;}}\n\n  /* ===== 7. Indeterminate progress ===== */\n  .prog-block{width:78%;display:flex;flex-direction:column;gap:14px;}\n  .prog-cap{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--label);text-transform:uppercase;display:flex;justify-content:space-between;}\n  .prog{height:6px;border-radius:99px;background:#eef0f4;overflow:hidden;position:relative;}\n  .prog::after{\n    content:\"\";position:absolute;top:0;height:100%;width:40%;border-radius:99px;\n    background:linear-gradient(90deg,var(--blue),var(--teal));\n    animation:slide 1.4s cubic-bezier(.65,0,.35,1) infinite;\n  }\n  @keyframes slide{0%{left:-42%;}100%{left:102%;}}\n\n  /* ===== 8. Counting number ===== */\n  .count-block{display:flex;flex-direction:column;align-items:center;gap:10px;}\n  .count-num{font-size:46px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}\n  .count-cap{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--label);}\n  .count-track{width:120px;height:3px;border-radius:99px;background:#eef0f4;overflow:hidden;margin-top:4px;position:relative;}\n  .count-track i{position:absolute;left:0;top:0;height:100%;background:var(--blue);border-radius:99px;animation:fill 2.2s ease-in-out infinite;}\n  @keyframes fill{0%{width:0;}70%{width:100%;}100%{width:100%;opacity:0;}}\n\n  /* ===== 9. Concentric arc spinner ===== */\n  .arc-spin{position:relative;width:78px;height:78px;}\n  .arc-spin svg{position:absolute;inset:0;}\n  .arc{fill:none;stroke-linecap:round;}\n  .a1{stroke:var(--blue);stroke-width:5;stroke-dasharray:90 200;stroke-dashoffset:0;}\n  .a2{stroke:var(--teal);stroke-width:5;stroke-dasharray:55 200;stroke-dashoffset:-85;}\n  .a3{stroke:var(--purple);stroke-width:5;stroke-dasharray:30 200;stroke-dashoffset:-150;}\n  @keyframes rot{100%{transform:rotate(360deg);}}\n  .arc-spin g{transform-box:fill-box;transform-origin:center;}\n  .arc-spin g.g1{animation:rot 1.1s linear infinite;}\n  .arc-spin g.g2{animation:rot 1.5s linear infinite reverse;}\n  .arc-spin g.g3{animation:rot .9s linear infinite;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"page-head\">\n    <div class=\"crumb\"><b>Ledger<\u002Fb> / Components / Loading states<\u002Fdiv>\n    <h1>Loading states<\u002Fh1>\n    <div class=\"sub\">Nine placeholders &amp; spinners tuned to the dashboard palette · loops continuously<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid\">\n\n    <!-- 1 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"skel-card\">\n          <div class=\"shimmer sk-label\"><\u002Fdiv>\n          <div class=\"shimmer sk-num\"><\u002Fdiv>\n          <div class=\"shimmer sk-spark\"><\u002Fdiv>\n          <div class=\"shimmer sk-foot\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">KPI Skeleton<\u002Fspan><span class=\"idx\">01<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 2 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <svg class=\"line-wrap\" viewBox=\"0 0 280 150\" preserveAspectRatio=\"none\">\n          <line class=\"grid-line\" x1=\"0\" y1=\"40\" x2=\"280\" y2=\"40\"><\u002Fline>\n          <line class=\"grid-line\" x1=\"0\" y1=\"80\" x2=\"280\" y2=\"80\"><\u002Fline>\n          <line class=\"grid-line\" x1=\"0\" y1=\"120\" x2=\"280\" y2=\"120\"><\u002Fline>\n          <path class=\"line-path\" d=\"M0,118 C40,110 60,70 100,72 S160,40 200,30 240,20 280,14\"><\u002Fpath>\n          <path class=\"line-path t2\" d=\"M0,128 C50,124 90,118 130,112 S210,104 280,96\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Chart Draw-in<\u002Fspan><span class=\"idx\">02<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 3 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <svg class=\"donut\" width=\"120\" height=\"120\" viewBox=\"0 0 120 120\">\n          <circle class=\"track\" cx=\"60\" cy=\"60\" r=\"48\"><\u002Fcircle>\n          <g class=\"donut-seg-wrap\">\n            <circle class=\"seg\" cx=\"60\" cy=\"60\" r=\"48\" stroke=\"var(--blue)\"><\u002Fcircle>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Donut Spinner<\u002Fspan><span class=\"idx\">03<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 4 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"bars\">\n          <span style=\"background:var(--blue);animation-delay:0s\"><\u002Fspan>\n          <span style=\"background:var(--blue);animation-delay:.12s\"><\u002Fspan>\n          <span style=\"background:var(--teal);animation-delay:.24s\"><\u002Fspan>\n          <span style=\"background:var(--teal);animation-delay:.36s\"><\u002Fspan>\n          <span style=\"background:var(--purple);animation-delay:.48s\"><\u002Fspan>\n          <span style=\"background:var(--purple);animation-delay:.6s\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Bar Loader<\u002Fspan><span class=\"idx\">04<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 5 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"spark-block\">\n          <div class=\"shimmer sk-sparknum\"><\u002Fdiv>\n          <svg class=\"spark-svg\" width=\"170\" height=\"48\" viewBox=\"0 0 170 48\">\n            <path class=\"sp\" d=\"M2,40 L24,34 46,38 68,24 90,30 112,14 134,20 168,6\"><\u002Fpath>\n            <circle class=\"spark-dot\" cx=\"168\" cy=\"6\" r=\"4\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Sparkline Pulse<\u002Fspan><span class=\"idx\">05<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 6 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Sequential Dots<\u002Fspan><span class=\"idx\">06<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 7 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"prog-block\">\n          <div class=\"prog-cap\"><span>Syncing accounts<\u002Fspan><span>···<\u002Fspan><\u002Fdiv>\n          <div class=\"prog\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Progress Sweep<\u002Fspan><span class=\"idx\">07<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 8 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"count-block\">\n          <div class=\"count-num\" id=\"counter\">$0<\u002Fdiv>\n          <div class=\"count-cap\">Total MRR<\u002Fdiv>\n          <div class=\"count-track\"><i><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Counting Metric<\u002Fspan><span class=\"idx\">08<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 9 -->\n    <div class=\"cell\">\n      <div class=\"stage\">\n        <div class=\"arc-spin\">\n          <svg viewBox=\"0 0 78 78\"><g class=\"g1\"><circle class=\"arc a1\" cx=\"39\" cy=\"39\" r=\"34\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n          <svg viewBox=\"0 0 78 78\"><g class=\"g2\"><circle class=\"arc a2\" cx=\"39\" cy=\"39\" r=\"25\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n          <svg viewBox=\"0 0 78 78\"><g class=\"g3\"><circle class=\"arc a3\" cx=\"39\" cy=\"39\" r=\"16\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\"><span class=\"name\">Concentric Arcs<\u002Fspan><span class=\"idx\">09<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<script>\n  // Counting metric loop (08)\n  (function(){\n    const el = document.getElementById('counter');\n    const target = 78300;\n    function run(){\n      const start = performance.now(), dur = 1540;\n      function step(now){\n        let t = Math.min(1,(now-start)/dur);\n        const e = 1 - Math.pow(1-t,3);\n        const v = Math.round(target*e);\n        el.textContent = '$' + v.toLocaleString();\n        if(t<1){ requestAnimationFrame(step); }\n        else { setTimeout(()=>{ el.textContent='$0'; setTimeout(run,180); }, 660); }\n      }\n      requestAnimationFrame(step);\n    }\n    run();\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
